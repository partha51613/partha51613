<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Analytics Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            --accent-color: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            color: #1e293b;
            padding-bottom: 120px; /* Space for the FAB */
        }

        /* Card Styles */
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); }
        .entry-card { 
            border-left: 6px solid #e2e8f0; 
            transition: all 0.2s ease;
            margin-bottom: 1.25rem;
        }
        .entry-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.08); }
        .entry-card:focus-within { border-left-color: var(--accent-color); }
        
        /* Status States */
        .is-overlap { border-left-color: #f59e0b !important; background-color: #fffbeb; }
        .is-invalid-range { border-left-color: #ef4444 !important; background-color: #fef2f2; }

        /* Floating Action Button */
        .btn-fab { 
            position: fixed; 
            bottom: 40px; 
            right: 40px; 
            border-radius: 16px; 
            padding: 16px 28px; 
            font-weight: 700; 
            background: var(--primary-gradient);
            border: none;
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4); 
            z-index: 1050;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-fab:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 25px 30px -5px rgba(79, 70, 229, 0.5); color: white; }

        /* Chart Elements */
        .chart-container-wrapper { position: relative; height: 300px; width: 100%; }
        .chart-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            text-align: center; pointer-events: none;
        }
        .chart-center-text .val { display: block; font-size: 2rem; font-weight: 800; color: #1e293b; }
        .chart-center-text .lbl { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.1em; }

        /* Bottom Display UI */
        .total-display { 
            background: var(--primary-gradient); 
            color: white; 
            border: none;
            overflow: hidden;
            position: relative;
        }
        .total-display::before {
            content: ""; position: absolute; top: -50%; left: -10%; width: 40%; height: 200%;
            background: rgba(255,255,255,0.05); transform: rotate(25deg); pointer-events: none;
        }

        /* Segmented Control (Standard/Days) */
        .view-toggle-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            display: inline-flex;
        }
        .view-toggle-group .btn-check:checked + .btn {
            background: white !important;
            color: var(--accent-color) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .view-toggle-group .btn {
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        /* Refined Reset Button */
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .btn-reset:hover {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.5);
            color: #ffb3b3;
        }

        .duration-badge { 
            font-size: 0.7rem; 
            background: #f1f5f9; 
            color: #475569; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-weight: 800; 
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row mb-5 align-items-end">
        <div class="col-md-8">
            <h1 class="fw-bold display-6 mb-1" style="letter-spacing: -0.02em;">Experience Calculator</h1>
            <p class="text-muted mb-0">Manage, calculate, and visualize your experience tenure across multiple organizations.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <div class="btn-group shadow-sm">
                <button class="btn btn-white border bg-white fw-semibold" onclick="saveJSON()">Backup</button>
                <button class="btn btn-dark fw-semibold" onclick="document.getElementById('loadFile').click()">Import</button>
            </div>
            <input type="file" id="loadFile" hidden accept=".json" onchange="loadJSON(event)">
        </div>
    </div>

    <div class="row g-4">
        <div class="col-xl-8">
            <div id="entries"></div>
        </div>

        <div class="col-xl-4">
            <div class="card p-4 sticky-top" style="top: 24px;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold m-0 text-secondary" style="font-size: 0.75rem; letter-spacing: 0.05em;">TENURE DISTRIBUTION</h6>
                    <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
                </div>
                
                <div class="chart-container-wrapper">
                    <canvas id="expChart"></canvas>
                    <div class="chart-center-text">
                        <span class="val" id="centerDays">0</span>
                        <span class="lbl">Total Days</span>
                    </div>
                </div>
                
                <hr class="my-4 opacity-50">
                <div id="chartLegend" class="small">
                    <div class="text-muted text-center italic">Add valid dates to see distribution chart</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-lg mt-5 total-display">
        <div class="card-body p-4 p-md-5">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <p class="text-uppercase mb-2 fw-bold" style="opacity: 0.8; font-size: 0.7rem; letter-spacing: 0.15em;">Aggregated Work Experience</p>
                    <h1 class="display-3 fw-bold m-0" id="totalExp" style="letter-spacing: -0.04em;">0 days</h1>
                    <div class="mt-3 d-flex gap-3 opacity-75">
                        <small id="entryCount" class="fw-medium">0 Positions Added</small>
                        <small class="fw-medium">•</small>
                        <small id="lastUpdated" class="fw-medium">Syncing...</small>
                    </div>
                </div>
                
                <div class="col-md-5 text-md-end mt-4 mt-md-0">
                    <div class="d-flex flex-column align-items-md-end gap-3">
                        <div class="view-toggle-group">
                            <input type="radio" class="btn-check" name="viewMode" id="viewDetailed" checked onchange="calculate()">
                            <label class="btn" for="viewDetailed">Standard View</label>
                          
                            <input type="radio" class="btn-check" name="viewMode" id="viewDays" onchange="calculate()">
                            <label class="btn" for="viewDays">Days Only</label>
                        </div>
                        
                        <button class="btn btn-reset d-inline-flex align-items-center gap-2" onclick="clearAll()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                            Clear Storage
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<button class="btn btn-primary btn-fab" onclick="addEntry()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" class="me-2"><path d="M12 4v16m8-8H4"></path></svg>
    Add New Position
</button>

<script>
let entries = JSON.parse(localStorage.getItem('exp_data')) || [];
const today = new Date().toISOString().split('T')[0];
let expChart = null;

const palette = ['#6366f1', '#a855f7', '#3b82f6', '#06b6d4', '#10b981', '#f43f5e', '#f59e0b'];

function saveToLocal() { localStorage.setItem('exp_data', JSON.stringify(entries)); }

function addEntry(data = {}) {
    const id = (Date.now() + Math.random()).toString();
    let defaultStart = (entries.length > 0 && entries[entries.length-1].end) ? entries[entries.length-1].end : '';
    entries.push({ id, org: data.org || '', role: data.role || '', start: data.start || defaultStart, end: data.end || '', present: data.present || false });
    render();
}

function deleteEntry(id) { 
    if(confirm("Permanently delete this position?")) { 
        entries = entries.filter(e => e.id !== id); 
        saveToLocal();
        render(); 
    } 
}

function clearAll() {
    if(confirm("This will wipe all data from your browser storage. Proceed?")) {
        entries = [];
        localStorage.removeItem('exp_data');
        addEntry();
    }
}

function updateEntry(id, field, value) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    entry[field] = value;
    if (field === 'present' && value === true) entry.end = today;
    saveToLocal();
    render();
}

function syncData(id, field, value) {
    const entry = entries.find(e => e.id === id);
    if (entry) { entry[field] = value; saveToLocal(); calculate(); }
}

function getDays(s, e, pres) {
    if (!s || (!e && !pres)) return 0;
    const start = new Date(s), end = pres ? new Date() : new Date(e);
    if (isNaN(start) || isNaN(end) || start > end) return 0;
    return Math.floor(((end - start) / (1000 * 60 * 60 * 24)) + 1);
}

function formatStr(total) {
    const y = Math.floor(total / 365.25), m = Math.floor((total % 365.25) / 30.44), d = Math.floor((total % 365.25) % 30.44);
    let o = [];
    if (y > 0) o.push(`${y}y`);
    if (m > 0) o.push(`${m}m`);
    o.push(`${d}d`);
    return o.join(' ');
}

function render() {
    const container = document.getElementById('entries');
    const sorted = [...entries].filter(e => e.start && (e.end || e.present)).sort((a,b) => new Date(a.start) - new Date(b.start));
    const overlaps = new Set();
    
    for(let i = 0; i < sorted.length - 1; i++) {
        const end = sorted[i].present ? new Date() : new Date(sorted[i].end);
        if (end > new Date(sorted[i+1].start)) { overlaps.add(sorted[i].id); overlaps.add(sorted[i+1].id); }
    }

    container.innerHTML = entries.map(e => {
        const isErr = e.start && e.end && new Date(e.start) > new Date(e.end);
        const days = getDays(e.start, e.end, e.present);
        return `
        <div class="card entry-card p-4 bg-white ${isErr ? 'is-invalid-range' : ''} ${overlaps.has(e.id) && !isErr ? 'is-overlap' : ''}">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="duration-badge">${days > 0 ? formatStr(days) + ` (${days} days)` : 'Timeline Pending'}</span>
                ${overlaps.has(e.id) && !isErr ? '<span class="badge rounded-pill bg-warning text-dark px-3" style="font-size:0.6rem">OVERLAP</span>' : ''}
            </div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="small fw-bold text-muted mb-1">Organization</label>
                    <input class="form-control fw-bold border-0 bg-light" placeholder="e.g. Acme Corp" value="${e.org}" oninput="syncData('${e.id}','org',this.value)">
                </div>
                <div class="col-md-3">
                    <label class="small fw-bold text-muted mb-1">Start Date</label>
                    <input type="date" class="form-control border-0 bg-light" value="${e.start}" onchange="updateEntry('${e.id}','start',this.value)">
                </div>
                <div class="col-md-3">
                    <label class="small fw-bold text-muted mb-1">End Date</label>
                    <input type="date" class="form-control border-0 bg-light" ${e.present ? 'disabled' : ''} value="${e.end}" onchange="updateEntry('${e.id}','end',this.value)">
                </div>
                <div class="col-md-1 d-flex align-items-end pb-1">
                    <div class="form-check form-switch mb-1">
                        <input type="checkbox" class="form-check-input" ${e.present ? 'checked' : ''} onchange="updateEntry('${e.id}','present',this.checked)">
                    </div>
                </div>
                <div class="col-md-1 d-flex align-items-end justify-content-end pb-1">
                    <button class="btn btn-outline-danger border-0 btn-sm" onclick="deleteEntry('${e.id}')">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
    calculate();
}

function calculate() {
    let ranges = [], labels = [], values = [], totalRaw = 0;

    entries.forEach(e => {
        let d = getDays(e.start, e.end, e.present);
        if (d > 0) {
            ranges.push([new Date(e.start), e.present ? new Date() : new Date(e.end)]);
            labels.push(e.org || 'Company');
            values.push(d);
        }
    });

    if (ranges.length > 0) {
        ranges.sort((a, b) => a[0] - b[0]);
        let merged = [];
        ranges.forEach(r => {
            if (!merged.length || r[0] > merged[merged.length-1][1]) merged.push(r);
            else merged[merged.length-1][1] = new Date(Math.max(merged[merged.length-1][1], r[1]));
        });
        merged.forEach(r => totalRaw += ((r[1] - r[0]) / (1000 * 60 * 60 * 24)) + 1);
    }

    const isDays = document.getElementById('viewDays').checked;
    document.getElementById('totalExp').innerText = isDays ? Math.floor(totalRaw) + " Days" : formatStr(totalRaw);
    document.getElementById('centerDays').innerText = Math.floor(totalRaw);
    document.getElementById('entryCount').innerText = `${entries.length} Professional Positions`;
    document.getElementById('lastUpdated').innerText = `Last Sync: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    
    updateChart(labels, values);
}

function updateChart(labels, values) {
    const ctx = document.getElementById('expChart').getContext('2d');
    if (expChart) expChart.destroy();
    
    if(values.length === 0) return;

    expChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: palette,
                borderWidth: 0,
                hoverOffset: 20
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '80%',
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#1e293b',
                    padding: 15,
                    cornerRadius: 12,
                    displayColors: false,
                    callbacks: { label: (item) => ` ${item.raw} Days` }
                }
            }
        }
    });
}

function saveJSON() {
    const data = JSON.stringify({ experiences: entries }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Experience_Backup_${today}.json`;
    a.click();
}

function loadJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            entries = JSON.parse(e.target.result).experiences || [];
            saveToLocal();
            render();
        } catch (err) { alert("Format error: Select a valid Experience JSON file."); }
    };
    reader.readAsText(file);
}

// Initial Launch
if (entries.length === 0) addEntry(); else render();
</script>

</body>
</html>
